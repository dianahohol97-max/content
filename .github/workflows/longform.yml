name: bloom focus — YouTube Long-form

on:
  schedule:
    - cron: "0 3 * * 1"     # Monday 06:00 Kyiv — generate a batch of scripts + build first video
    - cron: "0 3 */2 * *"   # every 2 days 06:00 Kyiv — build ONE more video from the queue
  workflow_dispatch:
    inputs:
      week:
        description: "Week number (blank = current ISO week)"
        required: false
        default: ""
      count:
        description: "How many long videos to generate"
        required: false
        default: "1"
      mode:
        description: "full = script+video | video-only | script-only"
        required: false
        default: "full"
      limit:
        description: "Limit how many videos to build (blank = all)"
        required: false
        default: ""
      voice_engine:
        description: "Voice: gemini (free, best for long) or elevenlabs"
        required: false
        default: "gemini"

permissions:
  contents: write

jobs:
  longform:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install deps
        run: npm install

      - name: Resolve inputs (cron-safe defaults)
        id: cfg
        run: |
          # - Monday cron (0 3 * * 1) => full: top up the script queue + build 1
          # - every-2-days cron      => video-only: build 1 more from the queue
          # - manual                 => use provided inputs
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "0 3 * * 1" ]; then
              echo "mode=full" >> $GITHUB_OUTPUT
            else
              echo "mode=video-only" >> $GITHUB_OUTPUT
            fi
            echo "count=4"   >> $GITHUB_OUTPUT
            echo "limit=1"   >> $GITHUB_OUTPUT
            echo "voice=gemini" >> $GITHUB_OUTPUT
            echo "week=" >> $GITHUB_OUTPUT
          else
            echo "mode=${{ inputs.mode || 'full' }}" >> $GITHUB_OUTPUT
            echo "count=${{ inputs.count || '4' }}" >> $GITHUB_OUTPUT
            echo "limit=${{ inputs.limit || '1' }}" >> $GITHUB_OUTPUT
            echo "voice=${{ inputs.voice_engine || 'gemini' }}" >> $GITHUB_OUTPUT
            echo "week=${{ inputs.week || '' }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate scripts
        if: ${{ steps.cfg.outputs.mode == 'full' || steps.cfg.outputs.mode == 'script-only' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node bloom/longform-generator.js ${{ steps.cfg.outputs.week != '' && format('--week={0}', steps.cfg.outputs.week) || '' }} --count=${{ steps.cfg.outputs.count }}

      - name: Build videos
        if: ${{ steps.cfg.outputs.mode == 'full' || steps.cfg.outputs.mode == 'video-only' }}
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VOICE_ENGINE: ${{ steps.cfg.outputs.voice }}
        run: node bloom/longform-build.js ${{ steps.cfg.outputs.week != '' && format('--week={0}', steps.cfg.outputs.week) || '' }} ${{ steps.cfg.outputs.limit != '' && format('--limit={0}', steps.cfg.outputs.limit) || '' }}

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A || true
          git commit -m "longform: auto (mode=${{ steps.cfg.outputs.mode }})" || echo "nothing to commit"
          git pull --rebase origin main || true
          git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main) || echo "push failed"
