name: bloom focus — Image Test

on:
  workflow_dispatch:
    inputs:
      week:
        description: 'Week number'
        required: true
        default: '29'
      limit:
        description: 'How many images (test)'
        required: true
        default: '8'
      only:
        description: 'Content type'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - pinterest
          - stories
          - carousels

permissions:
  contents: write

jobs:
  generate-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Generate text pack
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node bloom/text-generator.js --week=${{ github.event.inputs.week }}

      - name: Generate test images
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node bloom/image-generator.js --week=${{ github.event.inputs.week }} --only=${{ github.event.inputs.only }} --limit=${{ github.event.inputs.limit }}

      - name: Commit images to repo
        run: |
          git config user.name "bloom-bot"
          git config user.email "bot@bloomfocus.org"
          git add output/images/ -f
          git commit -m "test images: week ${{ github.event.inputs.week }} (${{ github.event.inputs.only }})" || echo "nothing to commit"
          git push

      - name: Print public URLs
        run: |
          echo "=== PUBLIC IMAGE URLS (for Make.com) ==="
          for f in $(find output/images -name "*.png" | sort); do
            echo "https://raw.githubusercontent.com/dianahohol97-max/content/main/$f"
          done

      - name: Upload images as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bloom-images-test-week${{ github.event.inputs.week }}
          path: output/images/
          retention-days: 7
