name: bloom focus — Instagram Carousels

on:
  schedule:
    - cron: "30 4 * * 1"   # Monday 07:30 Kyiv — weekly 7-day carousel pack
  workflow_dispatch:
    inputs:
      week:
        description: "Week number"
        required: true
        default: "29"
      count:
        description: "How many carousels (7 = full week)"
        required: false
        default: "7"
      mode:
        description: "full = text+images | images-only | text-only"
        required: false
        default: "full"
      limit:
        description: "Limit carousels to build (blank = all)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  carousels:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install

      - name: Generate carousels
        if: ${{ inputs.mode == '' || inputs.mode == 'full' || inputs.mode == 'text-only' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node bloom/carousel-generator.js --week=${{ inputs.week || '' }} --count=${{ inputs.count || '7' }}

      - name: Build slides
        if: ${{ inputs.mode == '' || inputs.mode == 'full' || inputs.mode == 'images-only' }}
        run: node bloom/carousel-build.js --week=${{ inputs.week || '' }} ${{ inputs.limit != '' && format('--limit={0}', inputs.limit) || '' }}

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add carousel_week_${{ inputs.week }}.json carousel_current.json output/carousels/ output/library/ || true
          git commit -m "carousels: week ${{ inputs.week }} (mode=${{ inputs.mode }})" || echo "nothing to commit"
          git pull --rebase origin main || true
          git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main) || echo "push failed"
