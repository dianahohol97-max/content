name: bloom focus — DALL-E Infographic Test

on:
  workflow_dispatch:
    inputs:
      week:
        description: 'Week number'
        required: true
        default: '29'
      limit:
        description: 'How many infographics (test)'
        required: true
        default: '3'

permissions:
  contents: write

jobs:
  dalle-infographic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Generate pins (text) if needed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node bloom/pinterest-generator.js --week=${{ github.event.inputs.week }} --day=1

      - name: Generate DALL-E infographics
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node bloom/pinterest-infographic-dalle.js --week=${{ github.event.inputs.week }} --limit=${{ github.event.inputs.limit }}

      - name: Upload infographics as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bloom-dalle-infographics-week${{ github.event.inputs.week }}
          path: output/pinterest-dalle/
          retention-days: 7
