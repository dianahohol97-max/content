name: bloom focus — YouTube Shorts

on:
  schedule:
    - cron: "0 3 * * 1"     # Monday 06:00 Kyiv — generate weekly scripts + build first video
    - cron: "0 6,18 * * *"  # every day 09:00 & 21:00 Kyiv — build ONE more video
  workflow_dispatch:
    inputs:
      week:
        description: "Week number (blank = current ISO week)"
        required: false
        default: ""
      count:
        description: "How many shorts to generate (text step)"
        required: false
        default: "18"
      mode:
        description: "full = script+video | video-only = build from existing JSON | script-only"
        required: false
        default: "full"
      limit:
        description: "Limit how many videos to build (blank = all)"
        required: false
        default: ""
      voice_engine:
        description: "Voice: elevenlabs (best) or gemini (free)"
        required: false
        default: "elevenlabs"

permissions:
  contents: write

jobs:
  shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install deps
        run: npm install

      - name: Resolve inputs (cron-safe defaults)
        id: cfg
        run: |
          # Determine mode based on trigger:
          # - Monday cron (0 3) => full (scripts + first video, limit 1)
          # - 12h cron (0 6,18) => video-only (build 1 more)
          # - manual => use provided inputs
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "0 3 * * 1" ]; then
              echo "mode=full"   >> $GITHUB_OUTPUT
              echo "limit=1"     >> $GITHUB_OUTPUT
            else
              echo "mode=video-only" >> $GITHUB_OUTPUT
              echo "limit=1"         >> $GITHUB_OUTPUT
            fi
            echo "count=18"  >> $GITHUB_OUTPUT
            echo "voice=elevenlabs" >> $GITHUB_OUTPUT
            echo "week=" >> $GITHUB_OUTPUT
          else
            echo "mode=${{ inputs.mode || 'full' }}"   >> $GITHUB_OUTPUT
            echo "count=${{ inputs.count || '18' }}"   >> $GITHUB_OUTPUT
            echo "voice=${{ inputs.voice_engine || 'elevenlabs' }}" >> $GITHUB_OUTPUT
            echo "week=${{ inputs.week || '' }}"       >> $GITHUB_OUTPUT
            echo "limit=${{ inputs.limit || '' }}"     >> $GITHUB_OUTPUT
          fi

      - name: Generate scripts
        if: ${{ steps.cfg.outputs.mode == 'full' || steps.cfg.outputs.mode == 'script-only' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node bloom/shorts-generator.js ${{ steps.cfg.outputs.week != '' && format('--week={0}', steps.cfg.outputs.week) || '' }} --count=${{ steps.cfg.outputs.count }}

      - name: Build videos
        if: ${{ steps.cfg.outputs.mode == 'full' || steps.cfg.outputs.mode == 'video-only' }}
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VOICE_ENGINE: ${{ steps.cfg.outputs.voice }}
        run: node bloom/shorts-build.js ${{ steps.cfg.outputs.week != '' && format('--week={0}', steps.cfg.outputs.week) || '' }} ${{ steps.cfg.outputs.limit != '' && format('--limit={0}', steps.cfg.outputs.limit) || '' }}

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A || true
          git commit -m "shorts: auto (mode=${{ steps.cfg.outputs.mode }})" || echo "nothing to commit"
          git pull --rebase origin main || true
          git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main) || echo "push failed"
