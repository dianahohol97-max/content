name: bloom focus — Instagram Stories

on:
  schedule:
    - cron: "0 5 * * 1"   # every Monday 08:00 Kyiv (auto-pilot)
  workflow_dispatch:
    inputs:
      week:
        description: "Week number (blank = current ISO week)"
        required: false
        default: ""
      mode:
        description: "full = text+images | images-only | text-only"
        required: false
        default: "full"
      limit:
        description: "Limit images to build (blank = all)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  stories:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install

      - name: Resolve inputs (cron-safe defaults)
        id: cfg
        run: |
          echo "mode=${{ inputs.mode || 'full' }}" >> $GITHUB_OUTPUT
          echo "week=${{ inputs.week || '' }}" >> $GITHUB_OUTPUT

      - name: Generate stories
        if: ${{ steps.cfg.outputs.mode == 'full' || steps.cfg.outputs.mode == 'text-only' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node bloom/stories-generator.js ${{ steps.cfg.outputs.week != '' && format('--week={0}', steps.cfg.outputs.week) || '' }}

      - name: Build images
        if: ${{ steps.cfg.outputs.mode == 'full' || steps.cfg.outputs.mode == 'images-only' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node bloom/stories-build.js ${{ steps.cfg.outputs.week != '' && format('--week={0}', steps.cfg.outputs.week) || '' }} ${{ inputs.limit != '' && format('--limit={0}', inputs.limit) || '' }}

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A || true
          git commit -m "stories: auto (mode=${{ steps.cfg.outputs.mode }})" || echo "nothing to commit"
          git pull --rebase origin main || true
          git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main) || echo "push failed"
