name: bloom focus — Instagram Stories

on:
  workflow_dispatch:
    inputs:
      week:
        description: "Week number"
        required: true
        default: "29"
      mode:
        description: "full = text+images | images-only | text-only"
        required: false
        default: "full"
      limit:
        description: "Limit images to build (blank = all)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  stories:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install

      - name: Generate stories
        if: ${{ inputs.mode == 'full' || inputs.mode == 'text-only' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node bloom/stories-generator.js --week=${{ inputs.week }}

      - name: Build images
        if: ${{ inputs.mode == 'full' || inputs.mode == 'images-only' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node bloom/stories-build.js --week=${{ inputs.week }} ${{ inputs.limit != '' && format('--limit={0}', inputs.limit) || '' }}

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add stories_week_${{ inputs.week }}.json stories_current.json output/stories/ || true
          git commit -m "stories: week ${{ inputs.week }} (mode=${{ inputs.mode }})" || echo "nothing to commit"
          git pull --rebase origin main || true
          git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main) || echo "push failed"
