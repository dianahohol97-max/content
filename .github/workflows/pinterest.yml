name: bloom focus — Pinterest

on:
  workflow_dispatch:
    inputs:
      week:
        description: 'Week number'
        required: true
        default: '29'
      day:
        description: 'Single day (1-7) or empty for full week'
        required: false
        default: ''
      mode:
        description: 'What to run'
        required: true
        default: 'full'
        type: choice
        options:
          - 'full'              # generate text + all images
          - 'images-only'       # keep existing JSON, generate images
          - 'resume'            # keep JSON, generate ONLY missing images
      limit:
        description: 'Limit images (for testing, e.g. 5)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  pinterest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Generate Pinterest pins (text)
        if: github.event.inputs.mode == 'full'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${{ github.event.inputs.day }}" ]; then
            node bloom/pinterest-generator.js --week=${{ github.event.inputs.week }}
          else
            node bloom/pinterest-generator.js --week=${{ github.event.inputs.week }} --day=${{ github.event.inputs.day }}
          fi

      - name: Commit pins JSON to repo
        if: github.event.inputs.mode == 'full'
        run: |
          git config user.name "bloom-bot"
          git config user.email "bot@bloomfocus.org"
          git pull --no-edit origin main || true
          cp pinterest_week_${{ github.event.inputs.week }}.json pinterest_current.json
          git add pinterest_week_*.json pinterest_current.json -f
          git commit -m "pinterest text: week ${{ github.event.inputs.week }}" || echo "nothing to commit"
          git push

      - name: Build pin images
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ARGS="--week=${{ github.event.inputs.week }}"
          if [ -n "${{ github.event.inputs.day }}" ]; then ARGS="$ARGS --day=${{ github.event.inputs.day }}"; fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then ARGS="$ARGS --limit=${{ github.event.inputs.limit }}"; fi
          if [ "${{ github.event.inputs.mode }}" = "resume" ]; then ARGS="$ARGS --skip-existing=true"; fi
          node bloom/pinterest-build-all.js $ARGS

      - name: Commit images + updated JSON
        run: |
          git config user.name "bloom-bot"
          git config user.email "bot@bloomfocus.org"
          git pull --no-edit origin main || true
          cp pinterest_week_${{ github.event.inputs.week }}.json pinterest_current.json
          git add output/pinterest/ pinterest_week_*.json pinterest_current.json -f
          git commit -m "pinterest images: week ${{ github.event.inputs.week }} (${{ github.event.inputs.mode }})" || echo "nothing to commit"
          git push

      - name: Print public image URLs
        run: |
          echo "=== PUBLIC PIN IMAGE URLS ==="
          for f in $(find output/pinterest/week_${{ github.event.inputs.week }} -name "*.png" 2>/dev/null | sort); do
            echo "https://raw.githubusercontent.com/dianahohol97-max/content/main/$f"
          done

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bloom-pinterest-week${{ github.event.inputs.week }}
          path: |
            pinterest_week_*.json
            output/pinterest/
          retention-days: 7
